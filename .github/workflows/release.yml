name: Release

# **Only a tag fires this, and only a human pushes tags.**
#
# Publishing downloadable binaries under the owner's name is a deliberate act, not something an
# automated run should do on its way past. Nothing here is triggered by a push to `main`.
#
# The artifacts are **unsigned**: macOS and Windows will warn users, and a usable `.ipa` needs Apple
# Developer membership ($99/yr) which is not set up. There is also no installer yet. Ship
# Linux/Windows/macOS/Android unsigned first; add signing when it earns its keep.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Build the server natively on each OS. **Never cross-compile it**: `bun build --compile
  # --target=…` produces a foreign binary happily, but `@napi-rs/canvas`'s native Skia binding is
  # per-platform and only the host's is in `node_modules` -- so a cross-compiled server ships
  # without the binding the PDF path needs, and cannot read a PDF at all.
  #
  # `bun run build --target=server` builds it, **runs it, and feeds it a real PDF**, exiting
  # non-zero if it refuses. A build that cannot read a PDF must never reach a release page -- that
  # is not hypothetical, it shipped once.
  server:
    name: server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun run build --target=server
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: server-${{ matrix.os }}
          path: dist/
          retention-days: 7

  client:
    name: client (${{ matrix.target }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, target: linux}
          - {os: ubuntu-latest, target: apk}
          - {os: macos-latest, target: macos}
          - {os: windows-latest, target: windows}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version-file: apps/client/pubspec.yaml
          cache: true
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        if: matrix.target == 'apk'
        with:
          distribution: temurin
          java-version: '17'
      - name: linux desktop deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev
      - run: bun install --frozen-lockfile
      - run: flutter pub get
        working-directory: apps/client
      - run: bun run build --target=${{ matrix.target }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: client-${{ matrix.target }}
          path: apps/client/build/
          retention-days: 7

  # The Release itself. Assets attached here are **free, unlimited, permanent, and downloadable
  # without a GitHub login** -- unlike Actions artifacts, which expire and require an account.
  publish:
    name: publish the release
    needs: [server, client]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # the ONLY job that gets it
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      - name: collect the assets
        run: |
          mkdir -p release
          find artifacts -type f \
            \( -name 'nelle-server*' -o -name '*.apk' -o -name '*.zip' -o -name '*.dmg' \) \
            -exec cp {} release/ \;
          ls -la release/
      # One checksums file covering every asset, so a download can be verified without a
      # GitHub login -- the same integrity property the server's own llama.cpp installer
      # now enforces on what *it* downloads.
      - name: write SHA256SUMS
        run: cd release && sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: release/*
          draft: true # a human decides when it goes live
          generate_release_notes: true
