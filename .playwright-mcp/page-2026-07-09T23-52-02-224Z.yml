                                                - text: (the completion of a week).
                                    - paragraph [ref=f24e411]: To think about 7 is to realize that humans do not live in a world of raw data. We live in a world of patterns. We look at the chaotic spectrum of light and see seven colors; we look at the endless flow of time and see seven days. Seven is the number by which we attempt to frame the infinite. It is the tool we use to chop the continuous world into discrete, understandable pieces.
